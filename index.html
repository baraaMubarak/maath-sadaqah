<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار</title>
    <style>
        body { font-size: 30px; text-align: center; padding: 50px; }
        #test { color: green; }
    </style>
</head>
<body>
    <div id="test">جاري التحميل...</div>
    <button onclick="changeText()">اضغط هنا</button>
    
    <script>
        function changeText() {
            document.getElementById('test').innerHTML = 'JavaScript شغال ✅';
            document.getElementById('test').style.color = 'blue';
        }
        
        // اختبار تلقائي
        setTimeout(() => {
            document.getElementById('test').innerHTML = 'الصفحة جاهزة';
        }, 1000);
    </script>
</body>
</html>
